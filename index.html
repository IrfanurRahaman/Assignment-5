<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

            <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">  
    
            <!-- tailwind and daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 

            <!-- font style -->
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="h-screen flex items-center justify-center ">
    <main class="h-[744px] w-[520px] mx-auto shadow-lg p-8 rounded-lg ">
        <div class="flex flex-col items-center mb-4">
            <img class="w-[100px] mb-6" src="assets/github-logo.png" alt="">
            <h2 class="font-semibold text-2xl mb-1">GitHub Issues Tracker</h2>
            <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
        </div>

                <!-- login form -->

        <div class="card bg-base-100 w-full">
            <div class="card-body">
                <fieldset class="fieldset  space-y-4">
                    <label class="label font-bold text-neutral-800 text-sm">Username</label>
                    <input type="text" class="input w-full" placeholder="Enter Username" />
                    <label class="label font-bold text-neutral-800 text-sm">Password</label>
                    <input type="password" class="input w-full" placeholder="Enter Password" />
                    <button class="btn btn-primary mt-4">Sign In</button>
                </fieldset>
            </div>
        </div>    
        
        <div class="flex items-center gap-3 my-4">
            <div class="flex-1 border-t border-gray-300"></div>
            <span class="text-center">OR</span>
            <div class="flex-1 border-t border-gray-300"></div>
        </div>

        <div>
            <p class="text-[#64748B] mb-2 text-center">Demo Credentials:</p>

            <div class="bg-[#F8FAFC] p-4 text-center">
                <p class="font-semibold">Username: admin</p>
                <p class="font-semibold">Password: admin123</p>
            </div>
        </div>
    </main>

    <script src="scripts/login.js"></script>
</body>
</html>

            <!-- font style -->
    <style>
        *{
            font-family: "Geist", sans-serif;
        }

<body class="bg-[#F8FAFC]">
    <header class="navbar bg-base-100 shadow-sm">
        <div class="w-11/12 m-auto flex">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img class="w-9" src="assets/github-logo.png" alt="">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text"  placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto" />
                
                <div>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </div>
    </header>

                <!-- main seciton -->

    <main class="w-[1110px] m-auto mt-[60px]">

                <!-- buttons section -->

        <section class="shadow-sm p-6 mb-4 bg-white rounded-lg">
            <button id="all-btn" onclick="btnToggle('all-btn'); getAllData()" class="btn btn-primary w-[120px]">All</button>

            <button id="open-btn" onclick="btnToggle('open-btn'); getOpenData()" class="btn  w-[120px]">Open</button>

            <button id="closed-btn" onclick="btnToggle('closed-btn'); getCloseData()" class="btn  w-[120px]">Closed</button>
        </section>

                <!-- issues count section -->

        <section class="flex justify-between p-6 shadow-sm bg-white rounded-lg border-b border-gray-200">
            <div class="flex gap-2">
                <img class="w-12 h-12" src="assets/Aperture.png" alt="">

                <div>
                    <h2 class="font-bold text-lg"> <span id="issue-count">0</span> Issues</h2>
                    <p class="text-neutral-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
                    <p>Open</p>
                </div>

                <div class="flex items-center gap-2">
                    <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </section>  
        
                <!-- card container section -->

        <section  class="shadow-sm p-6 bg-white rounded-lg ">
            <div id="card-container" class="grid grid-cols-4 gap-3">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

            <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">  
    
            <!-- tailwind and daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 


            <!-- font awesome CDN -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />        

            <!-- font style -->
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <header class="navbar bg-base-100 shadow-sm">
        <div class="w-11/12 m-auto flex">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img class="w-9" src="assets/github-logo.png" alt="">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text"  placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto" />
                
                <div>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </div>
    </header>

                <!-- main seciton -->

    <main class="w-[1110px] m-auto mt-[60px]">

                <!-- buttons section -->

        <section class="shadow-sm p-6 mb-4 bg-white rounded-lg">
            <button class="btn btn-primary w-[120px]">All</button>

            <button class="btn btn-primary w-[120px]">Open</button>

            <button class="btn btn-primary w-[120px]">Closed</button>
        </section>

                <!-- issues count section -->

        <section class="flex justify-between p-6 shadow-sm bg-white rounded-lg border-b border-gray-200">
            <div class="flex gap-2">
                <img class="w-12 h-12" src="assets/Aperture.png" alt="">

                <div>
                    <h2 class="font-bold text-lg">50 Issues</h2>
                    <p class="text-neutral-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
                    <p>Open</p>
                </div>

                <div class="flex items-center gap-2">
                    <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </section>  
        
                <!-- card container section -->

                


    </main>            
</body>
</html>
